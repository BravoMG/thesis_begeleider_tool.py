name: Thesis Begeleider Check

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  beoordeling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --upgrade pip

      - name: Run tests
        run: python -m unittest discover -s test -v || true

      - name: Run thesis tool
        run: python thesis_begeleider_tool.py

      - name: Generate report
        if: always()
        run: |
          mkdir -p rapporten
          echo "Thesis check uitgevoerd op $(date)" > rapporten/check_resultaat.txt

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: thesis-beoordelingsrapport
          path: rapporten/
          retention-days: 30

      - name: Notification
        if: failure()
        run: echo "Thesis check heeft feedback opgeleverd. Bekijk de logs."
