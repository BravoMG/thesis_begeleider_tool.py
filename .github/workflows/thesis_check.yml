name: "🔍 Thesis Begeleider - Automatische Check"

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  beoordeling:
    runs-on: ubuntu-latest
    name: "Voer thesisbeoordeling uit"
    
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "📦 Installeer dependencies"
        run: |
          python -m pip install --upgrade pip

      - name: "🧪 Draai unittesten"
        run: |
          python -m unittest discover -s test -v || true

      - name: "📘 Voer thesisbegeleider tool uit"
        run: |
          python thesis_begeleider_tool.py
        id: thesis_check

      - name: "📊 Genereer rapport"
        if: always()
        run: |
          mkdir -p rapporten
          python -c "
from datetime import datetime
with open('rapporten/check_resultaat.txt', 'w') as f:
    f.write(f'Thesis check uitgevoerd op {datetime.now()}\n')
    f.write('Zie console output voor details\n')
"

      - name: "📤 Upload rapport"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: thesis-beoordelingsrapport
          path: rapporten/
          retention-days: 30

      - name: "✅ Notificatie"
        if: failure()
        run: |
          echo "⚠️ Thesis check heeft feedback opgeleverd. Bekijk de logs."
